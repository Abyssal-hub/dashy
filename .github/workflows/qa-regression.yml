name: QA Regression Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run contract tests with testcontainers
        working-directory: ./backend
        env:
          SECRET_KEY: ci-test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 15
          REFRESH_TOKEN_EXPIRE_DAYS: 7
        run: |
          # Exclude launch_stack test (requires Docker socket and launch.sh)
          pytest tests/test_contract.py -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker build -t dashboard-backend:ci .

  alembic-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dashboard_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dashboard_test
        run: |
          alembic upgrade head
          alembic current
          alembic downgrade base
          alembic upgrade head

  launch-script-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [backend-tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      
      - name: Test launch.sh
        working-directory: .
        run: |
          # Make launch.sh executable and test it
          chmod +x launch.sh
          ./launch.sh
          
          # Verify services are healthy
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "✓ Stack is healthy"
              exit 0
            fi
            echo -n "."
            sleep 2
          done
          
          echo "✗ Stack failed to become healthy"
          exit 1
      
      - name: Cleanup
        if: always()
        working-directory: .
        run: docker-compose down -v
