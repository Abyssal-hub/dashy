name: Development Tasks

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to execute (e.g., DEV-004 module system)'
        required: true
        type: string
      task_id:
        description: 'Task ID (e.g., DEV-004)'
        required: true
        type: string
      timeout_minutes:
        description: 'Timeout in minutes (max 30)'
        required: false
        default: '25'
        type: string

env:
  PYTHON_VERSION: "3.12"

jobs:
  dev-task:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(inputs.timeout_minutes) }}
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dashboard_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests baseline
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dashboard_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 15
          REFRESH_TOKEN_EXPIRE_DAYS: 7
        run: |
          # Exclude launch script tests (require Docker Compose)
          pytest tests/ -v --tb=short --ignore=tests/test_launch_script.py --ignore=tests/test_launch_stack.py

      - name: Execute development task
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dashboard_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 15
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          TASK_DESCRIPTION: ${{ inputs.task }}
          TASK_ID: ${{ inputs.task_id }}
        run: |
          echo "Executing task: $TASK_ID - $TASK_DESCRIPTION"
          echo "This is where OpenClaw subagent execution would run"
          echo "With 25-minute timeout and real PostgreSQL/Redis services"

      - name: Run final verification
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dashboard_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest tests/test_contract.py -v
