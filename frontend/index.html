<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashy - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0a0a0f',
                            800: '#12121a',
                            700: '#1a1a25',
                            600: '#22222e',
                            500: '#2a2a3a',
                        },
                        accent: {
                            purple: '#8b5cf6',
                            violet: '#7c3aed',
                            cyan: '#06b6d4',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
        }
        
        .brand-gradient {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #7c3aed 100%);
        }
        
        .brand-text {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass-card {
            background: linear-gradient(145deg, #1a1a25 0%, #151520 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            border: 1px solid rgba(139, 92, 246, 0.5);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
        }
        
        .input-field {
            background: #12121a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        
        .input-field::placeholder {
            color: #4a4a5a;
        }
        
        .glow-bg {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            pointer-events: none;
        }
        
        .glow-1 {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            top: -200px;
            right: -200px;
        }
        
        .glow-2 {
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            bottom: -200px;
            left: -200px;
        }
    </style>
</head>
<body class="bg-dark-900 min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background glow effects -->
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>
    
    <div class="glass-card p-8 md:p-10 rounded-3xl w-full max-w-md mx-4 relative z-10">
        <!-- Logo and Header -->
        <div class="text-center mb-10">
            <div class="flex justify-center mb-4">
                <span class="bg-dark-700 text-gray-400 text-xs font-medium px-3 py-1.5 rounded-full border border-white/5">
                    MVP v1.0
                </span>
            </div>
            
            <div class="w-16 h-16 rounded-2xl brand-gradient flex items-center justify-center mx-auto mb-4 shadow-lg shadow-purple-500/30">
                <i class="fas fa-chart-line text-white text-2xl"></i>
            </div>
            
            <h1 class="text-3xl font-bold brand-text mb-2">Dashy</h1>
            <p class="text-gray-500">Personal Monitoring Dashboard</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-500"></i>
                    </div>
                    <input 
                        type="email" 
                        id="email" 
                        required
                        class="input-field w-full pl-11 pr-4 py-3.5 rounded-xl text-white outline-none"
                        placeholder="you@example.com"
                    >
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-500"></i>
                    </div>
                    <input 
                        type="password" 
                        id="password" 
                        required
                        class="input-field w-full pl-11 pr-4 py-3.5 rounded-xl text-white outline-none"
                        placeholder="••••••••"
                    >
                </div>
            </div>

            <div id="error" class="hidden text-red-400 text-sm text-center bg-red-500/10 px-4 py-3 rounded-xl border border-red-500/20"></div>

            <button 
                type="submit"
                id="submitBtn"
                class="btn-primary w-full text-white py-3.5 rounded-xl transition duration-200 font-semibold flex items-center justify-center space-x-2"
            >
                <span>Sign In</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">
                Don't have an account? 
                <span class="text-accent-purple cursor-pointer hover:text-accent-violet transition font-medium" onclick="showRegister()">
                    Register
                </span>
            </p>
        </div>
        
        <!-- Footer info -->
        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <p class="text-xs text-gray-600">Secure authentication with JWT tokens</p>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin.includes('localhost') ? 'http://localhost:8000' : '';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i><span>Signing in...</span>';
            submitBtn.disabled = true;
            errorDiv.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    window.location.href = '/dashboard.html';
                } else {
                    const error = await response.json();
                    errorDiv.textContent = error.detail || 'Invalid credentials';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Is the backend running?';
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.innerHTML = '<span>Sign In</span><i class="fas fa-arrow-right"></i>';
                submitBtn.disabled = false;
            }
        });

        function showRegister() {
            alert('Registration via API for now. Use the backend to create accounts.');
        }
    </script>
</body>
</html>
