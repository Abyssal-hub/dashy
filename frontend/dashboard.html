<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashy - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .module-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .module-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1rem;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold gradient-bg bg-clip-text text-transparent">Dashy</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="openAddModuleModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
                        <i class="fas fa-plus mr-2"></i>Add Module
                    </button>
                    <button onclick="logout()" class="text-gray-600 hover:text-gray-900">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="loading" class="flex justify-center items-center py-20">
            <div class="loading-spinner"></div>
        </div>

        <div id="empty-state" class="hidden text-center py-20">
            <i class="fas fa-cubes text-6xl text-gray-300 mb-4"></i>
            <h2 class="text-2xl font-semibold text-gray-700 mb-2">No modules yet</h2>
            <p class="text-gray-500 mb-6">Add your first module to get started</p>
            <button onclick="openAddModuleModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">
                Add Your First Module
            </button>
        </div>

        <div id="modules-grid" class="grid-container hidden">
            <!-- Modules will be rendered here -->
        </div>
    </div>

    <!-- Add Module Modal -->
    <div id="addModuleModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4">
            <div class="p-6 border-b">
                <h2 class="text-xl font-semibold">Add Module</h2>
            </div>
            <div class="p-6">
                <form id="addModuleForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Module Type</label>
                        <select id="moduleType" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="">Select type...</option>
                            <option value="portfolio">📊 Portfolio</option>
                            <option value="calendar">📅 Calendar</option>
                            <option value="log">📝 Log</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Name</label>
                        <input type="text" id="moduleName" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="My Portfolio">
                    </div>
                    <div id="addModuleError" class="hidden text-red-600 text-sm"></div>
                </form>
            </div>
            <div class="p-6 border-t flex justify-end space-x-3">
                <button onclick="closeAddModuleModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                <button onclick="submitAddModule()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Add</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin.includes('localhost') ? 'http://localhost:8000/api' : '/api';
        let modules = [];

        // Check auth
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        // API helper
        async function api(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });

            if (response.status === 401) {
                logout();
                return;
            }

            return response;
        }

        // Load modules
        async function loadModules() {
            try {
                const response = await api('/modules');
                if (!response) return;

                modules = await response.json();
                renderModules();
            } catch (err) {
                console.error('Failed to load modules:', err);
                showError('Failed to load modules');
            }
        }

        // Render modules in grid
        function renderModules() {
            document.getElementById('loading').classList.add('hidden');
            const grid = document.getElementById('modules-grid');
            const emptyState = document.getElementById('empty-state');

            if (modules.length === 0) {
                emptyState.classList.remove('hidden');
                grid.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.classList.remove('hidden');

            grid.innerHTML = modules.map((module, index) => `
                <div class="module-card bg-white rounded-xl shadow-sm border p-6 ${getGridClass(module.size || 'medium')}"
                     style="grid-column: span ${getWidth(module)}; grid-row: span ${getHeight(module)};">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 rounded-lg bg-indigo-100 flex items-center justify-center">
                                <i class="fas ${getIcon(module.module_type)} text-indigo-600"></i>
                            </div>
                            <div>
                                <h3 class="font-semibold text-gray-800">${module.name}</h3>
                                <p class="text-sm text-gray-500 capitalize">${module.module_type}</p>
                            </div>
                        </div>
                        <button onclick="deleteModule('${module.id}')" class="text-gray-400 hover:text-red-600">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="text-gray-600">
                        ${getModulePreview(module)}
                    </div>
                </div>
            `).join('');
        }

        function getGridClass(size) {
            const classes = {
                compact: 'col-span-3',
                medium: 'col-span-6',
                expanded: 'col-span-12'
            };
            return classes[size] || 'col-span-6';
        }

        function getWidth(module) {
            const widths = { compact: 3, medium: 6, expanded: 12 };
            return widths[module.size] || 6;
        }

        function getHeight(module) {
            const heights = { compact: 1, medium: 2, expanded: 3 };
            return heights[module.size] || 2;
        }

        function getIcon(type) {
            const icons = {
                portfolio: 'fa-chart-line',
                calendar: 'fa-calendar-alt',
                log: 'fa-file-alt'
            };
            return icons[type] || 'fa-cube';
        }

        function getModulePreview(module) {
            // Placeholder content based on module type
            const previews = {
                portfolio: `
                    <div class="text-center py-4">
                        <p class="text-2xl font-bold text-indigo-600">$0.00</p>
                        <p class="text-sm text-gray-500">Total Value</p>
                    </div>
                `,
                calendar: `
                    <div class="space-y-2">
                        <div class="flex items-center space-x-2 text-sm">
                            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                            <span>No events today</span>
                        </div>
                    </div>
                `,
                log: `
                    <div class="text-sm text-gray-500">
                        <p>Last entry: Never</p>
                    </div>
                `
            };
            return previews[module.module_type] || '<p>Module content</p>';
        }

        // Modal functions
        function openAddModuleModal() {
            document.getElementById('addModuleModal').classList.remove('hidden');
        }

        function closeAddModuleModal() {
            document.getElementById('addModuleModal').classList.add('hidden');
            document.getElementById('addModuleForm').reset();
            document.getElementById('addModuleError').classList.add('hidden');
        }

        async function submitAddModule() {
            const type = document.getElementById('moduleType').value;
            const name = document.getElementById('moduleName').value;
            const errorDiv = document.getElementById('addModuleError');

            if (!type || !name) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const response = await api('/modules', {
                    method: 'POST',
                    body: JSON.stringify({
                        module_type: type,
                        name: name,
                        config: {},
                        size: 'medium'
                    })
                });

                if (response.ok) {
                    closeAddModuleModal();
                    loadModules();
                } else {
                    const error = await response.json();
                    errorDiv.textContent = error.detail || 'Failed to add module';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Network error';
                errorDiv.classList.remove('hidden');
            }
        }

        async function deleteModule(id) {
            if (!confirm('Delete this module?')) return;

            try {
                const response = await api(`/modules/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadModules();
                }
            } catch (err) {
                showError('Failed to delete module');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/';
        }

        function showError(message) {
            alert(message); // Simple error for MVP
        }

        // Load on startup
        loadModules();
    </script>
</body>
</html>
