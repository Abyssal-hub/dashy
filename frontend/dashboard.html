<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashy - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0a0a0f',
                            800: '#12121a',
                            700: '#1a1a25',
                            600: '#22222e',
                            500: '#2a2a3a',
                        },
                        accent: {
                            purple: '#8b5cf6',
                            violet: '#7c3aed',
                            cyan: '#06b6d4',
                        },
                        status: {
                            online: '#10b981',
                            warning: '#f59e0b',
                            critical: '#ef4444',
                            info: '#3b82f6',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
        }
        
        .glass-card {
            background: linear-gradient(145deg, #1a1a25 0%, #151520 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }
        
        .glass-card:hover {
            border-color: rgba(139, 92, 246, 0.2);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.15);
        }
        
        .brand-gradient {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #7c3aed 100%);
        }
        
        .brand-text {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glow-text {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5), 0 0 40px rgba(139, 92, 246, 0.3);
        }
        
        .icon-badge {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        
        .status-dot {
            box-shadow: 0 0 8px currentColor;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            border: 1px solid rgba(139, 92, 246, 0.5);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.25rem;
        }
        
        .loading-spinner {
            border: 3px solid rgba(139, 92, 246, 0.1);
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #10b981 0%, #34d399 100%);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }
        
        .progress-bar-warning {
            background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        
        .time-glow {
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.6), 0 0 60px rgba(139, 92, 246, 0.3);
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a4a;
        }
    </style>
</head>
<body class="bg-dark-900 min-h-screen text-gray-200">
    <!-- Header -->
    <nav class="bg-dark-800/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl brand-gradient flex items-center justify-center shadow-lg shadow-purple-500/20">
                        <i class="fas fa-chart-line text-white text-lg"></i>
                    </div>
                    <span class="text-2xl font-bold brand-text tracking-tight">Dashy</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="bg-dark-700 text-gray-400 text-xs font-medium px-3 py-1.5 rounded-full border border-white/5">
                        MVP v1.0
                    </span>
                    <button onclick="openAddModuleModal()" class="btn-primary text-white px-4 py-2 rounded-xl transition flex items-center space-x-2">
                        <i class="fas fa-plus text-sm"></i>
                        <span>Add Module</span>
                    </button>
                    <button onclick="logout()" class="w-10 h-10 rounded-xl bg-dark-700 hover:bg-dark-600 flex items-center justify-center transition border border-white/5">
                        <i class="fas fa-sign-out-alt text-gray-400"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Time Widget (like NewsMonitor) -->
        <div id="time-widget" class="glass-card rounded-2xl p-6 mb-6 hidden">
            <div class="flex items-center justify-center space-x-2 text-accent-purple mb-2">
                <i class="fas fa-moon text-sm"></i>
                <span class="text-xs font-medium uppercase tracking-wider">Nighttime</span>
            </div>
            <div class="text-center">
                <div id="current-time" class="text-5xl md:text-6xl font-bold text-white time-glow tracking-tight">
                    --:--:--
                </div>
                <div id="current-date" class="text-gray-400 mt-2 text-lg">
                    Loading...
                </div>
            </div>
        </div>

        <div id="loading" class="flex justify-center items-center py-20">
            <div class="loading-spinner"></div>
        </div>

        <div id="empty-state" class="hidden text-center py-20">
            <div class="w-20 h-20 rounded-2xl glass-card flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-cubes text-3xl text-gray-600"></i>
            </div>
            <h2 class="text-2xl font-semibold text-white mb-2">No modules yet</h2>
            <p class="text-gray-500 mb-6">Add your first module to get started</p>
            <button onclick="openAddModuleModal()" class="btn-primary text-white px-6 py-3 rounded-xl transition">
                <i class="fas fa-plus mr-2"></i>Add Your First Module
            </button>
        </div>

        <div id="modules-grid" class="grid-container hidden">
            <!-- Modules will be rendered here -->
        </div>
    </div>

    <!-- Add Module Modal -->
    <div id="addModuleModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="glass-card rounded-2xl w-full max-w-md mx-4 overflow-hidden">
            <div class="p-6 border-b border-white/5">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-accent-purple/20 flex items-center justify-center">
                        <i class="fas fa-plus text-accent-purple"></i>
                    </div>
                    <h2 class="text-xl font-semibold text-white">Add Module</h2>
                </div>
            </div>
            <div class="p-6">
                <form id="addModuleForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Module Type</label>
                        <select id="moduleType" required class="w-full px-4 py-3 bg-dark-800 border border-white/10 rounded-xl focus:ring-2 focus:ring-accent-purple/50 focus:border-accent-purple/50 outline-none text-white transition">
                            <option value="" class="bg-dark-800">Select type...</option>
                            <option value="portfolio" class="bg-dark-800">📊 Portfolio</option>
                            <option value="calendar" class="bg-dark-800">📅 Calendar</option>
                            <option value="log" class="bg-dark-800">📝 Log</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Name</label>
                        <input type="text" id="moduleName" required class="w-full px-4 py-3 bg-dark-800 border border-white/10 rounded-xl focus:ring-2 focus:ring-accent-purple/50 focus:border-accent-purple/50 outline-none text-white placeholder-gray-600 transition" placeholder="My Portfolio">
                    </div>
                    <div id="addModuleError" class="hidden text-status-critical text-sm bg-status-critical/10 px-4 py-3 rounded-xl border border-status-critical/20"></div>
                </form>
            </div>
            <div class="p-6 border-t border-white/5 flex justify-end space-x-3">
                <button onclick="closeAddModuleModal()" class="px-5 py-2.5 text-gray-400 hover:text-white transition">Cancel</button>
                <button onclick="submitAddModule()" class="btn-primary text-white px-6 py-2.5 rounded-xl transition">Add Module</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin.includes('localhost') ? 'http://localhost:8000/api' : '/api';
        let modules = [];

        // Check auth
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        // Update time widget
        function updateTime() {
            const now = new Date();
            const timeEl = document.getElementById('current-time');
            const dateEl = document.getElementById('current-date');
            
            if (timeEl) {
                timeEl.textContent = now.toLocaleTimeString('en-US', { 
                    hour12: false, 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
            }
            if (dateEl) {
                dateEl.textContent = now.toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
            }
        }
        setInterval(updateTime, 1000);
        updateTime();

        // API helper
        async function api(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });

            if (response.status === 401) {
                logout();
                return;
            }

            return response;
        }

        // Load modules
        async function loadModules() {
            try {
                const response = await api('/modules');
                if (!response) return;

                const data = await response.json();
                modules = data.modules || [];
                renderModules();
            } catch (err) {
                console.error('Failed to load modules:', err);
                showError('Failed to load modules');
            }
        }

        // Render modules in grid
        function renderModules() {
            document.getElementById('loading').classList.add('hidden');
            const grid = document.getElementById('modules-grid');
            const emptyState = document.getElementById('empty-state');
            const timeWidget = document.getElementById('time-widget');

            // Show time widget when dashboard loads
            timeWidget.classList.remove('hidden');

            if (modules.length === 0) {
                emptyState.classList.remove('hidden');
                grid.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.classList.remove('hidden');

            grid.innerHTML = modules.map((module, index) => `
                <div class="glass-card rounded-2xl p-5 ${getGridClass(module.size || 'medium')} transition-all duration-300 hover:scale-[1.02]"
                     style="grid-column: span ${getWidth(module)}; grid-row: span ${getHeight(module)};">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-11 h-11 rounded-xl icon-badge flex items-center justify-center">
                                <i class="fas ${getIcon(module.module_type)} text-accent-purple text-lg"></i>
                            </div>
                            <div>
                                <h3 class="font-semibold text-white text-lg">${module.name}</h3>
                                <p class="text-sm text-gray-500 capitalize flex items-center space-x-2">
                                    <span class="w-1.5 h-1.5 rounded-full bg-status-online status-dot"></span>
                                    <span>${module.module_type}</span>
                                </p>
                            </div>
                        </div>
                        <button onclick="deleteModule('${module.id}')" class="w-8 h-8 rounded-lg hover:bg-status-critical/20 hover:text-status-critical text-gray-500 transition flex items-center justify-center">
                            <i class="fas fa-trash text-sm"></i>
                        </button>
                    </div>
                    <div class="text-gray-300">
                        ${getModulePreview(module)}
                    </div>
                </div>
            `).join('');
        }

        function getGridClass(size) {
            const classes = {
                compact: 'col-span-12 md:col-span-6 lg:col-span-3',
                medium: 'col-span-12 md:col-span-6',
                expanded: 'col-span-12'
            };
            return classes[size] || 'col-span-12 md:col-span-6';
        }

        function getWidth(module) {
            const widths = { compact: 3, medium: 6, expanded: 12 };
            return widths[module.size] || 6;
        }

        function getHeight(module) {
            const heights = { compact: 1, medium: 2, expanded: 3 };
            return heights[module.size] || 2;
        }

        function getIcon(type) {
            const icons = {
                portfolio: 'fa-chart-line',
                calendar: 'fa-calendar-alt',
                log: 'fa-file-alt'
            };
            return icons[type] || 'fa-cube';
        }

        function getModulePreview(module) {
            const previews = {
                portfolio: `
                    <div class="space-y-4">
                        <div class="flex items-baseline space-x-2">
                            <span class="text-3xl font-bold text-white">$0.00</span>
                            <span class="text-sm text-status-online flex items-center">
                                <i class="fas fa-arrow-up mr-1"></i>0.00%
                            </span>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-xs text-gray-400">
                                <span>Portfolio Value</span>
                                <span>0 assets</span>
                            </div>
                            <div class="h-2 bg-dark-600 rounded-full overflow-hidden">
                                <div class="h-full progress-bar rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                `,
                calendar: `
                    <div class="space-y-3">
                        <div class="flex items-center space-x-3 p-3 bg-dark-800/50 rounded-xl border border-white/5">
                            <div class="w-2 h-2 rounded-full bg-status-info status-dot"></div>
                            <span class="text-sm text-gray-300">No events today</span>
                        </div>
                        <div class="flex items-center justify-between text-xs text-gray-500">
                            <span>Upcoming</span>
                            <span class="text-accent-purple">0 events</span>
                        </div>
                    </div>
                `,
                log: `
                    <div class="space-y-3">
                        <div class="flex items-center space-x-3 p-3 bg-dark-800/50 rounded-xl border border-white/5">
                            <i class="fas fa-check-circle text-status-online"></i>
                            <span class="text-sm text-gray-300">System operational</span>
                        </div>
                        <div class="text-xs text-gray-500">
                            Last entry: <span class="text-gray-400">Never</span>
                        </div>
                    </div>
                `
            };
            return previews[module.module_type] || '<p class="text-gray-400">Module content</p>';
        }

        // Modal functions
        function openAddModuleModal() {
            document.getElementById('addModuleModal').classList.remove('hidden');
        }

        function closeAddModuleModal() {
            document.getElementById('addModuleModal').classList.add('hidden');
            document.getElementById('addModuleForm').reset();
            document.getElementById('addModuleError').classList.add('hidden');
        }

        async function submitAddModule() {
            const type = document.getElementById('moduleType').value;
            const name = document.getElementById('moduleName').value;
            const errorDiv = document.getElementById('addModuleError');

            if (!type || !name) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const response = await api('/modules', {
                    method: 'POST',
                    body: JSON.stringify({
                        module_type: type,
                        name: name,
                        config: {},
                        size: 'medium'
                    })
                });

                if (response.ok) {
                    closeAddModuleModal();
                    loadModules();
                } else {
                    const error = await response.json();
                    errorDiv.textContent = error.detail || 'Failed to add module';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Network error';
                errorDiv.classList.remove('hidden');
            }
        }

        async function deleteModule(id) {
            if (!confirm('Delete this module?')) return;

            try {
                const response = await api(`/modules/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadModules();
                }
            } catch (err) {
                showError('Failed to delete module');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/';
        }

        function showError(message) {
            alert(message);
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAddModuleModal();
            }
        });

        // Load on startup
        loadModules();
    </script>
</body>
</html>
